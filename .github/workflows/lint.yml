name: Golangci lint

on:
  push:
  workflow_dispatch:
permissions: read-all

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
      - name: Verify dependencies
        run: go mod tidy
      - name: Lint with golangci-lint
        uses: golangci/golangci-lint-action@v3
        with:
          version: v2.12