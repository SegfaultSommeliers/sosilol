services:
  app:
    build: .
    ports:
      - "8080:8080"
    env_file: .env
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: valkey
    depends_on:
      migrate:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy

  migrate:
    image: docker.io/migrate/migrate:v4.19.1
    volumes:
      - ./db/migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://${POSTGRES_USERNAME:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DATABASE:-postgres}?sslmode=disable
      up
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  postgres:
    image: docker.io/library/postgres:18.4-alpine3.23
    environment:
      POSTGRES_USER: ${POSTGRES_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DATABASE:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USERNAME:-postgres} -d ${POSTGRES_DATABASE:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  valkey:
    image: docker.io/valkey/valkey:9.1.0-alpine3.23
    volumes:
      - valkey_data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  cloudflared:
    image: docker.io/cloudflare/cloudflared:2026.2.0
    restart: unless-stopped

    profiles:
      - tunnel
    command: tunnel run --url ${CLOUDFLARE_URL} --token ${CLOUDFLARE_TUNNEL_TOKEN}

volumes:
  postgres_data:
  valkey_data:
