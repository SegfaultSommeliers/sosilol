version: "2"
run:
  timeout: 5m

linters:
  default: none
  enable:
    - govet
    - errcheck
    - staticcheck
    - unused
    - revive
    - gosec
    - goconst
    - bodyclose
  settings:
    revive:
      rules:
        - name: comments-density
          disabled: true
        - name: package-comments
          disabled: true